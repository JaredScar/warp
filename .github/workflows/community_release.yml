# Community release workflow — builds a Windows installer from the OSS channel
# and publishes it as a GitHub Release so it can be installed on other machines.
#
# Trigger options:
#   1. Push a version tag (e.g. `git tag v0.2026.05.01 && git push origin v0.2026.05.01`)
#   2. Run manually from the Actions tab (Actions → Community Release → Run workflow)

name: Community Release (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: >
          Version tag for the release (e.g. v0.2026.05.01).
          If left blank a date-based tag is generated automatically.
        required: false
        default: ''
      build_arm64:
        description: Also build an ARM64 installer
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Determine the version tag and arch list once, share with build jobs ──────
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.version.outputs.tag }}
      # JSON array consumed by the build matrix via fromJson().
      arch_matrix: ${{ steps.arch.outputs.matrix }}
    steps:
      - name: Resolve version tag
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.version }}" ]]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v0.$(date -u +%Y.%m.%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve architecture list
        id: arch
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.build_arm64 }}" == "true" ]]; then
            echo 'matrix=["x64","arm64"]' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix=["x64"]' >> "$GITHUB_OUTPUT"
          fi

  # ─── Windows build matrix ────────────────────────────────────────────────────
  build_windows:
    name: Build Windows installer (${{ matrix.arch }})
    runs-on: windows-latest
    needs: prepare
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJson(needs.prepare.outputs.arch_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Windows environment hygiene ──────────────────────────────────────────
      - name: Enable long paths in Git
        shell: bash
        run: git config --system core.longpaths true

      - name: Set CARGO_HOME to a short path (avoids MAX_PATH issues)
        shell: bash
        run: echo "CARGO_HOME=C:\cargo" >> "$GITHUB_ENV"

      # ── Rust toolchain + cache ───────────────────────────────────────────────
      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-${{ matrix.arch }}
          # Only save the cache on the default branch to keep storage tidy.
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install ARM64 Rust target
        if: matrix.arch == 'arm64'
        shell: bash
        run: rustup target add aarch64-pc-windows-msvc

      # ── cargo-binstall (needed by install_cargo_build_deps) ──────────────────
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1

      # ── System build tools ───────────────────────────────────────────────────
      - name: Install protoc
        uses: ConorMacBride/install-package@v1
        continue-on-error: true
        with:
          choco: protoc

      - name: Install protoc via winget (fallback)
        if: failure()
        shell: pwsh
        run: winget install Google.Protobuf --accept-package-agreements --accept-source-agreements

      - name: Install Inno Setup (installer builder)
        shell: pwsh
        run: choco install innosetup -y --no-progress

      # ── Node.js (needed for TypeScript command-signature generation) ──────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack (yarn)
        shell: bash
        run: corepack enable

      # ── Cargo-level build dependencies ───────────────────────────────────────
      - name: Install cargo build deps
        shell: bash
        run: ./script/install_cargo_build_deps

      - name: Install cargo-about (for third-party license generation)
        shell: bash
        run: cargo install --locked cargo-about@0.8.4

      # ── Build binary ─────────────────────────────────────────────────────────
      - name: Build Warp OSS binary
        id: build_binary
        shell: pwsh
        env:
          GIT_RELEASE_TAG: ${{ needs.prepare.outputs.version_tag }}
        run: |
          .\script\windows\bundle.ps1 `
            -Channel oss `
            -Arch ${{ matrix.arch }} `
            -SkipBuildInstaller

      # ── Build installer ───────────────────────────────────────────────────────
      - name: Build Warp OSS installer
        id: build_installer
        shell: pwsh
        env:
          GIT_RELEASE_TAG: ${{ needs.prepare.outputs.version_tag }}
        run: |
          .\script\windows\bundle.ps1 `
            -Channel oss `
            -Arch ${{ matrix.arch }} `
            -SkipBuildBinary

      # ── Upload installer as a workflow artifact for the release job ───────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ matrix.arch }}
          # The Inno Setup output lands in script/windows/Output/
          path: script/windows/Output/*.exe
          if-no-files-found: error
          retention-days: 7

  # ─── Create GitHub Release ───────────────────────────────────────────────────
  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build_windows]
    permissions:
      contents: write
    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: installers/

      - name: List downloaded files (debug)
        run: find installers/ -type f

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version_tag }}
          name: Warp OSS ${{ needs.prepare.outputs.version_tag }}
          body: |
            ## Warp OSS Community Build — ${{ needs.prepare.outputs.version_tag }}

            This is an **unsigned** community build of the Warp OSS channel,
            built automatically from `${{ github.sha }}`.

            ### Installation

            1. Download the installer for your architecture below.
            2. Run the `.exe` — Windows may warn about an unknown publisher
               because the binary is not code-signed. Click **More info → Run anyway**.
            3. Warp will be installed under `%LOCALAPPDATA%\Programs\WarpOss\`.

            ### Notes
            - This build uses the **`oss`** channel (no crash reporting / Sentry).
            - Automatic updates are **not** enabled; download a new release manually.
          draft: false
          prerelease: false
          files: installers/**/*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
          # Create the tag if it doesn't exist yet (covers workflow_dispatch case).
          make_latest: true
